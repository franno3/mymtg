name: Build and Deploy

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build Quartz
        run: npx quartz build --directory MtG

      - name: Add .htaccess
        run: cp .htaccess public/.htaccess

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa_mydevil
          chmod 600 ~/.ssh/id_rsa_mydevil
          ssh-keyscan -H s65.mydevil.net >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_rsa_mydevil" \
            public/ \
            franno3@s65.mydevil.net:/home/franno3/domains/mtg.calmcat.blog/public_html/
